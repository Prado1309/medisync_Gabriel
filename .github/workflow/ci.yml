name: MediSync CI

# Define que o teste rodará a cada 'push' ou 'pull request' na branch main
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verificar Estilo de Código (Linting)
      run: |
        # Para se houver erros de sintaxe Python ou undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisa sobre erros de estilo (PEP8), mas não trava o processo ainda
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Executar Testes Automatizados
      run: |
        python -m pytest